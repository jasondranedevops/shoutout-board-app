---
# Trivy security scanning for shoutout-board-app
#
# Three jobs:
#
#   trivy-fs      — scans source code and npm dependencies for CVEs and secrets.
#   trivy-config  — scans Dockerfiles for misconfigurations.
#   trivy-images  — scans built backend + frontend images for CVEs.
#
# Results are printed as a table in the Actions log.
# HIGH/CRITICAL findings fail PRs; push/nightly reports but does not block.

name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly

permissions:
  contents: read

jobs:
  # ── Filesystem / dependency CVE scan ──────────────────────────────────────
  trivy-fs:
    name: Filesystem & Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (PR — fail on HIGH/CRITICAL)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Run Trivy filesystem scan (push/schedule — report only)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

  # ── Dockerfile misconfiguration scan ──────────────────────────────────────
  trivy-config:
    name: Config & Dockerfile Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scan (PR — fail on HIGH/CRITICAL)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Run Trivy config scan (push/schedule — report only)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

  # ── Container image CVE scan ───────────────────────────────────────────────
  trivy-images:
    name: Image Scan
    runs-on: ubuntu-latest
    # Only run on push to main or nightly — images must exist in the registry
    if: github.event_name == 'push' || github.event_name == 'schedule'

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dockreg.figtree-development.com/shoutout-backend
            tag: "0.1.11"
            name: shoutout-backend
          - image: dockreg.figtree-development.com/shoutout-frontend
            tag: "0.1.15"
            name: shoutout-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: dockreg.figtree-development.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run Trivy image scan — ${{ matrix.name }} (report only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          # Update matrix tags above when bumping image versions.
          image-ref: ${{ matrix.image }}:${{ matrix.tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: false
