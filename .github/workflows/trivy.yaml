---
# Trivy security scanning for shoutout-board-app
#
# Three jobs:
#
#   trivy-fs      — scans source code and npm dependencies for CVEs.
#                   On push/nightly: saves JSON to security/trivy/fs-scan.json
#
#   trivy-config  — scans Dockerfiles for misconfigurations.
#                   On push/nightly: saves JSON to security/trivy/config-scan.json
#
#   trivy-images  — scans built backend + frontend images for CVEs (report only,
#                   not committed — runtime image scanning is handled by
#                   trivy-operator in the cluster, visible in Grafana).
#
# HIGH/CRITICAL findings fail PRs; push/nightly reports but does not block.

name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly

permissions:
  contents: write

jobs:
  # ── Filesystem / dependency CVE scan ──────────────────────────────────────
  trivy-fs:
    name: Filesystem & Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (PR — fail on HIGH/CRITICAL)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Run Trivy filesystem scan (push/schedule — table)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Run Trivy filesystem scan (push/schedule — JSON)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: security/trivy/fs-scan.json
          severity: HIGH,CRITICAL

      - name: Commit fs scan results
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add security/trivy/fs-scan.json
          git diff --staged --quiet || (git commit -m "ci: update Trivy fs scan results [skip ci]" && git push)

  # ── Dockerfile misconfiguration scan ──────────────────────────────────────
  trivy-config:
    name: Config & Dockerfile Scan
    runs-on: ubuntu-latest
    # Run after trivy-fs to avoid concurrent git push conflicts
    needs: trivy-fs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull the latest commit (trivy-fs may have just pushed)
          ref: ${{ github.ref }}

      - name: Run Trivy config scan (PR — fail on HIGH/CRITICAL)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Run Trivy config scan (push/schedule — table)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Run Trivy config scan (push/schedule — JSON)
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: security/trivy/config-scan.json
          severity: HIGH,CRITICAL

      - name: Commit config scan results
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add security/trivy/config-scan.json
          git diff --staged --quiet || (git commit -m "ci: update Trivy config scan results [skip ci]" && git push)

  # ── Container image CVE scan ───────────────────────────────────────────────
  trivy-images:
    name: Image Scan
    runs-on: ubuntu-latest
    # Only run on push to main or nightly — images must exist in the registry
    if: github.event_name == 'push' || github.event_name == 'schedule'

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dockreg.figtree-development.com/shoutout-backend
            tag: "0.1.13"
            name: shoutout-backend
          - image: dockreg.figtree-development.com/shoutout-frontend
            tag: "0.1.17"
            name: shoutout-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: dockreg.figtree-development.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run Trivy image scan — ${{ matrix.name }} (report only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          # Update matrix tags above when bumping image versions.
          image-ref: ${{ matrix.image }}:${{ matrix.tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: false
